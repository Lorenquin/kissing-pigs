<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Marti, de tu gordito 💕</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="title-container">
        <h1>Para Marti, de tu gordito 💕</h1>
    </div>
    
    <div class="container">
        <!-- LEFT PIG (Gordito) - Bigger and rounder with hat -->
        <div class="pig gordito" id="pig-left">
            <div class="hat"></div>
            <div class="head">
                <div class="snout"></div>
                <div class="eye left-eye">
                    <div class="pupil"></div>
                </div>
                <div class="eye right-eye">
                    <div class="pupil"></div>
                </div>
                <div class="ear left-ear"></div>
                <div class="ear right-ear"></div>
                <div class="cheek left-cheek"></div>
                <div class="cheek right-cheek"></div>
            </div>
            <div class="body"></div>
        </div>
        
        <!-- KISS ZONE WITH HEARTS -->
        <div class="kiss-zone">
            <div class="heart" style="--delay: 0s">💕</div>
            <div class="heart" style="--delay: 0.3s">💗</div>
            <div class="heart" style="--delay: 0.6s">💖</div>
            <div class="heart" style="--delay: 0.9s">💕</div>
            <div class="heart" style="--delay: 1.2s">💗</div>
            <div class="heart" style="--delay: 1.5s">💖</div>
        </div>
        
        <!-- RIGHT PIG (Marti) - Smaller with bow and eyelashes -->
        <div class="pig marti" id="pig-right">
            <div class="head">
                <div class="bow"></div>
                <div class="snout"></div>
                <div class="eye left-eye">
                    <div class="pupil"></div>
                    <div class="lash top-lash"></div>
                    <div class="lash bottom-lash"></div>
                </div>
                <div class="eye right-eye">
                    <div class="pupil"></div>
                    <div class="lash top-lash"></div>
                    <div class="lash bottom-lash"></div>
                </div>
                <div class="ear left-ear"></div>
                <div class="ear right-ear"></div>
                <div class="cheek left-cheek"></div>
                <div class="cheek right-cheek"></div>
            </div>
            <div class="body"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
